<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Time Capsule — Write to Your Future Self</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
  <div class="vintage-background"></div>
  
  <main class="container main-container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg">
          <div class="card-body">
            <div class="ornament">❖ ❖ ❖</div>
            <h1 class="card-title">A Message Through Time</h1>
            <p class="card-subtitle">Pen a letter to your future self...</p>
            
            <form id="capsuleForm">
              <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name"required>
              </div>

              <div class="mb-3">
                <label for="message" class="form-label">Your Message</label>
                <textarea class="form-control" id="message" name="message" rows="6" placeholder="Dearest Future Me..."required></textarea>
              </div>

              <div class="mb-3">
                <label for="date" class="form-label">Open on This Date</label>
                <input type="date" class="form-control" id="date" name="date"required>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold">
                <span>✦</span> Seal This Time Capsule <span>✦</span>
              </button>
            </form>
            
            <div class="mt-4 text-center">
              <div class="date-display">
                <small>Today: <strong id="currentDate"></strong></small>
              </div>
              <p class="text-muted small mt-3">
                <a href="view.html" class="text-decoration-none">View your saved capsules →</a>
              </p>
            </div>
            
            <div class="ornament" style="margin-top: 1.5rem;">❖ ❖ ❖</div>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/generate.js"></script>
  <script>
    // Display current date in vintage format
    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
      
      // Add magical cursor trail effect
      initCursorTrail();
    });
    
    function initCursorTrail() {
      const colors = ['#8b4513', '#d4af37', '#a0522d', '#c9a87c', '#ffd700'];
      let lastX = 0;
      let lastY = 0;
      
      document.addEventListener('mousemove', (e) => {
        const distance = Math.sqrt(
          Math.pow(e.clientX - lastX, 2) + Math.pow(e.clientY - lastY, 2)
        );
        
        if (distance > 10) {
          const particle = document.createElement('div');
          const size = Math.random() * 6 +4;
          const color = colors[Math.floor(Math.random() * colors.length)];
          
          particle.style.cssText = `
            position: fixed;
            width: ${size}px;
            height: ${size}px;
            background-color: ${color};
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            left: ${e.clientX - size/2}px;
            top: ${e.clientY - size/2}px;
            opacity: ${Math.random() * 0.5 + 0.5};
            box-shadow: 0 0 ${size}px ${color};
            animation: fadeAndFall 1s ease-out forwards;
          `;
          
          document.body.appendChild(particle);
          
          setTimeout(() => particle.remove(), 1000);
          
          lastX = e.clientX;
          lastY = e.clientY;
        }
      });
      
      // Add animation styles
      if (!document.getElementById('cursor-trail-styles')) {
        const style = document.createElement('style');
        style.id = 'cursor-trail-styles';
        style.textContent = `
          @keyframes fadeAndFall {
            0% {
              opacity: 1;
              transform: translateY(0) scale(1);
            }
            100% {
              opacity: 0;
              transform: translateY(20px) scale(0.5);
            }
          }
        `;
        document.head.appendChild(style);
      }
    }
  </script>
</body>
</html>
