<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Time Capsule — Create Your Message</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/create-view.css">
</head>
<body class="create-page">
  <!-- Animated Background -->
  <div class="stars"></div>
  <div class="nebula"></div>
  <div class="time-particles"></div>
  
  <!-- Floating Elements -->
  <div class="floating-objects">
    <div class="float-object clock">⏰</div>
    <div class="float-object envelope">✉️</div>
    <div class="float-object star">⭐</div>
    <div class="float-object hourglass">⏳</div>
    <div class="float-object scroll">📜</div>
  </div>
  
  <!-- Progress Bar -->
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <main class="page-container">
    <div class="content-wrapper">
      <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
          <div class="cosmic-card shadow-lg">
            <div class="card-body">
              <div class="ornament">❖ ❖ ❖</div>
              <h1 class="cosmic-title glitch-text" data-text="A Message Through Time">A Message Through Time</h1>
              <p class="cosmic-subtitle">Pen a letter to your future self...</p>
              
              <form id="capsuleForm" class="cosmic-form">
                <div class="input-group-cosmic mb-4">
                  <label for="name" class="cosmic-label">
                    <span class="label-icon">👤</span>
                    <span>Your Name</span>
                  </label>
                  <input type="text" class="cosmic-input" id="name" name="name" placeholder="Enter your name"required>
                  <div class="input-glow"></div>
                </div>

                <div class="input-group-cosmic mb-4">
                  <label for="message" class="cosmic-label">
                    <span class="label-icon">💭</span>
                    <span>Your Message</span>
                  </label>
                  <textarea class="cosmic-textarea" id="message" name="message" rows="6" placeholder="Dearest Future Me..."required></textarea>
                  <div class="input-glow"></div>
                </div>

                <div class="input-group-cosmic mb-4">
                  <label for="date" class="cosmic-label">
                    <span class="label-icon">📅</span>
                    <span>Open on This Date</span>
                  </label>
                  <input type="date" class="cosmic-input" id="date" name="date"required>
                  <div class="input-glow"></div>
                </div>

                <div class="input-group-cosmic mb-4">
                  <label for="password" class="cosmic-label">
                    <span class="label-icon">🔒</span>
                    <span>Security Password (8 characters)</span>
                  </label>
                  <input type="password" class="cosmic-input" id="password" name="password" placeholder="Enter 8-character password" maxlength="8" minlength="8" required>
                  <div class="input-glow"></div>
                </div>

                <button type="submit" class="btn-cosmic-primary w-100">
                  <span class="btn-text"><span>✦</span> Seal This Time Capsule <span>✦</span></span>
                  <span class="btn-shine"></span>
                  <span class="btn-particles"></span>
                </button>
              </form>
              
              <div class="cosmic-divider">
                <div class="divider-line"></div>
                <div class="divider-text">
                  <small>Today: <strong id="currentDate"></strong></small>
                </div>
              </div>
              
              <div class="navigation-links">
                <a href="landing.html" class="cosmic-link">
                  <span class="link-icon">←</span>
                  <span>Back to Home</span>
                </a>
                <span class="link-separator">•</span>
                <a href="view.html" class="cosmic-link">
                  <span>View your saved capsules</span>
                  <span class="link-icon">→</span>
                </a>
              </div>
              
              <div class="ornament footer-ornament">❖ ❖ ❖</div>
          </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Cursor Glow Effect -->
  <div class="cursor-glow"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/generate.js"></script>
  <script>
    // Display current date in vintage format
    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
      
      // Add magical cursor trail effect
      initCursorTrail();
    });
    
    function initCursorTrail() {
      const colors = ['#8b4513', '#d4af37', '#a0522d', '#c9a87c', '#ffd700'];
      let lastX = 0;
      let lastY = 0;
      
      document.addEventListener('mousemove', (e) => {
        const distance = Math.sqrt(
          Math.pow(e.clientX - lastX, 2) + Math.pow(e.clientY - lastY, 2)
        );
        
        if (distance > 10) {
          const particle = document.createElement('div');
          const size = Math.random() * 6 +4;
          const color = colors[Math.floor(Math.random() * colors.length)];
          
          particle.style.cssText = `
            position: fixed;
            width: ${size}px;
            height: ${size}px;
            background-color: ${color};
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            left: ${e.clientX - size/2}px;
            top: ${e.clientY - size/2}px;
            opacity: ${Math.random() * 0.5 + 0.5};
            box-shadow: 0 0 ${size}px ${color};
            animation: fadeAndFall 1s ease-out forwards;
          `;
          
          document.body.appendChild(particle);
          
          setTimeout(() => particle.remove(), 1000);
          
          lastX = e.clientX;
          lastY = e.clientY;
        }
      });
      
      // Add animation styles
      if (!document.getElementById('cursor-trail-styles')) {
        const style = document.createElement('style');
        style.id = 'cursor-trail-styles';
        style.textContent = `
          @keyframes fadeAndFall {
            0% {
              opacity: 1;
              transform: translateY(0) scale(1);
            }
            100% {
              opacity: 0;
              transform: translateY(20px) scale(0.5);
            }
          }
        `;
        document.head.appendChild(style);
      }
    }
  </script>
</body>
</html>
