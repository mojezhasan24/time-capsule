<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Time Capsule — Reveal Your Message</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/create-view.css">
</head>
<body class="view-page">
  <!-- Animated Background -->
  <div class="stars"></div>
  <div class="nebula"></div>
  <div class="time-particles"></div>
  
  <!-- Floating Elements -->
  <div class="floating-objects">
    <div class="float-object clock">⏰</div>
    <div class="float-object envelope">✉️</div>
    <div class="float-object star">⭐</div>
    <div class="float-object hourglass">⏳</div>
    <div class="float-object scroll">📜</div>
  </div>
  
  <!-- Progress Bar -->
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  
  <main class="page-container">
    <div class="content-wrapper">
      <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
          <div class="cosmic-card shadow-lg">
            <div class="card-body">
              <div class="ornament">❖ ❖ ❖</div>
              <h1 class="cosmic-title glitch-text" data-text="Your Time Capsule">Your Time Capsule</h1>
              <p class="cosmic-subtitle">A message from the past awaits...</p>
              
              <div id="capsule" class="cosmic-capsule-container"></div>
              
              <div class="navigation-buttons">
                <a href="landing.html" class="btn-cosmic-secondary">
                  <span class="btn-text"><span class="btn-icon">←</span> Back to Home</span>
                </a>
                <a href="index.html" class="btn-cosmic-secondary ms-2">
                  <span class="btn-text">Create Another Capsule<span class="btn-icon">→</span></span>
                </a>
              </div>
              
              <div class="ornament footer-ornament">❖ ❖ ❖</div>
          </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Cursor Glow Effect -->
  <div class="cursor-glow"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/view.js"></script>
  <script>
    // Add magical cursor trail effect
    document.addEventListener('DOMContentLoaded', () => {
      initCursorTrail();
    });
    
    function initCursorTrail() {
      const colors = ['#8b4513', '#d4af37', '#a0522d', '#c9a87c', '#ffd700'];
      let lastX = 0;
      let lastY = 0;
      
      document.addEventListener('mousemove', (e) => {
        const distance = Math.sqrt(
          Math.pow(e.clientX - lastX, 2) + Math.pow(e.clientY - lastY, 2)
        );
        
        if (distance > 10) {
          const particle = document.createElement('div');
          const size = Math.random() * 6 + 4;
          const color = colors[Math.floor(Math.random() * colors.length)];
          
          particle.style.cssText = `
            position: fixed;
            width: ${size}px;
            height: ${size}px;
            background-color: ${color};
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            left: ${e.clientX - size/2}px;
            top: ${e.clientY - size/2}px;
            opacity: ${Math.random() * 0.5 + 0.5};
            box-shadow: 0 0 ${size}px ${color};
            animation: fadeAndFall 1s ease-out forwards;
          `;
          
          document.body.appendChild(particle);
          
          setTimeout(() => particle.remove(), 1000);
          
          lastX = e.clientX;
          lastY = e.clientY;
        }
      });
      
      // Add animation styles
      if (!document.getElementById('cursor-trail-styles')) {
        const style = document.createElement('style');
        style.id = 'cursor-trail-styles';
        style.textContent = `
          @keyframes fadeAndFall {
            0% {
              opacity: 1;
              transform: translateY(0) scale(1);
            }
           100% {
              opacity: 0;
              transform: translateY(20px) scale(0.5);
            }
          }
        `;
        document.head.appendChild(style);
      }
    }
  </script>
</body>
</html>
